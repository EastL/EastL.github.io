<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原原台聚</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f6efe7;
      color: #6b4f3b;
    }

    .card {
      max-width: 520px;
      margin: 40px auto;
      background: #fffaf5;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-size: 26px;
      color: #8b5e3c;
      margin-bottom: 15px;
      font-weight: 700;
    }

    .block {
      background: #fff3eb;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #6b4f3b;
      line-height: 1.7;
    }

    .section-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: #8b5e3c;
    }

    .vip {
      cursor: pointer;
      user-select: none;
    }

    button {
      font-family: inherit;
    }

    .join-btn {
      display: inline-block;
      border: none;
      background: #ffd6d6;
      color: #8b5e3c;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .join-wrap {
      text-align: center;
      margin-top: 15px;
    }

    .footer-text {
      text-align: center;
      margin-top: 12px;
      font-size: 14px;
      color: #a57760;
    }

    /* 熊 */
    .bear {
      position: fixed;
      bottom: calc(20px + env(safe-area-inset-bottom));
      right: 16px;
      z-index: 999;
      animation: floatBear 3s ease-in-out infinite;
      transition: transform .3s ease;
      cursor: pointer;
      user-select: none;
    }

    @keyframes floatBear {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    .look-up {
      transform: rotate(-5deg);
    }

    .look-down {
      transform: rotate(5deg);
    }

    .bear-face {
      width: 70px;
      height: 70px;
      background: #c89f7a;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    }

    .ear {
      width: 30px;
      height: 30px;
      background: #c89f7a;
      border-radius: 50%;
      position: absolute;
    }

    .ear.left {
      top: -10px;
      left: -5px;
    }

    .ear.right {
      top: -10px;
      right: -5px;
    }

    .eye {
      width: 6px;
      height: 6px;
      background: #4b3a2f;
      border-radius: 50%;
      position: absolute;
      top: 30px;
    }

    .eye.left {
      left: 20px;
    }

    .eye.right {
      right: 20px;
    }

    .nose {
      width: 10px;
      height: 8px;
      background: #4b3a2f;
      border-radius: 50%;
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
    }

    .blush {
      width: 10px;
      height: 6px;
      background: #f5b7b1;
      border-radius: 50%;
      position: absolute;
      top: 40px;
    }

    .blush.left {
      left: 10px;
    }

    .blush.right {
      right: 10px;
    }

    /* 熊泡泡 */
    .bubble {
      display: none;
      position: absolute;
      bottom: 82px;
      right: 0;
      width: 180px;
      background: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      color: #6b4f3b;
    }

    .bubble.show {
      display: block;
    }

    .bubble::after {
      content: "";
      position: absolute;
      bottom: -8px;
      right: 18px;
      border-width: 8px 8px 0 8px;
      border-style: solid;
      border-color: #fff transparent transparent transparent;
    }

    /* 彈窗 */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      justify-content: center;
      align-items: center;
      z-index: 2000;
      padding: 20px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      background: #fffaf5;
      padding: 22px 20px;
      border-radius: 20px;
      text-align: center;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      animation: popIn .2s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(.94);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-box h3 {
      margin: 0 0 12px;
      color: #8b5e3c;
    }

    .modal-close {
      margin-top: 14px;
      border: none;
      background: #ffd6d6;
      color: #8b5e3c;
      padding: 8px 18px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .card {
        margin: 20px 14px 100px;
        padding: 18px;
      }

      .title {
        font-size: 24px;
      }

      .bear {
        right: 12px;
        bottom: calc(16px + env(safe-area-inset-bottom));
      }

      .bubble {
        width: 165px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">🎉 台聚活動公告 🎉</div>

    <div class="block">
      <div class="section-title">📅 日期</div>
      5/9（六）
    </div>

    <div class="block">
      <div class="section-title">🕒 時間</div>
      15:00
    </div>

    <div class="block">
      <div class="section-title">🍖 活動內容</div>
      吃燒肉、桌遊
    </div>

    <div class="block">
      <div class="section-title">📍 地點</div>
      台北市（報名成功後私訊提供詳細地址）
    </div>

    <div class="block">
      <div class="section-title">⏰ 報名時間</div>
      即日起 ～ 4/30<br>
      （額滿將提前截止）
    </div>

    <div class="block" id="fee">
      <div class="section-title">💰 報名費用</div>
      ・抖內 $520 或 贈訂 ×10份
    </div>

    <div class="block">
      <div class="section-title">💸 熟人優惠（曾來過台聚者）</div>
      ・抖內 $120 或 贈訂 ×3份
    </div>

    <div class="block vip" id="vip" onclick="openVIP()">
      <div class="section-title">💎 VIP 特權（點擊查看）</div>
    </div>

    <div class="block">
      <div class="section-title">👥 人數上限</div>
      15人
    </div>

    <div class="block" id="note">
      <div class="section-title">⚠️ 注意事項</div>
      ・報名費不包含當日活動費用<br>
      ・遲到不等尼！<br>
      ・未成年不得飲酒
    </div>

    <div class="join-wrap">
      <button class="join-btn" onclick="openJoin()">🎀 我要報名</button>
    </div>

    <div class="footer-text">
      —— 歡迎大家一起來玩 💕 ——
    </div>
  </div>

  <!-- 熊 -->
  <div class="bear" id="bear" onclick="toggleBubble()">
    <div class="bubble" id="bubble">
      <span id="bubbleText"></span>
    </div>
    <div class="bear-face">
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="blush left"></div>
      <div class="blush right"></div>
    </div>
  </div>

  <!-- VIP -->
  <div class="modal" id="vipModal" onclick="closeModal(event,'vipModal')">
    <div class="modal-box">
      <h3>💎 VIP 特權</h3>
      ✨免報名費<br>
      🚀優先權<br>
      🎁大禮物<br>
      <button class="modal-close" onclick="closeVIP()">關閉</button>
    </div>
  </div>

  <!-- JOIN -->
  <div class="modal" id="joinModal" onclick="closeModal(event,'joinModal')">
    <div class="modal-box">
      <h3>🎀 我要報名</h3>
      報名連結之後補上✨<br>
      <button class="modal-close" onclick="closeJoin()">OK</button>
    </div>
  </div>

  <script>
    let typing = false;
    let currentText = "";
    let typeTimer = null;

    function typeText(el, text, speed = 40) {
      if (typing || text === currentText) return;

      typing = true;
      currentText = text;
      clearTimeout(typeTimer);
      el.textContent = "";

      let i = 0;

      function t() {
        if (i < text.length) {
          el.textContent += text[i];
          i++;
          typeTimer = setTimeout(t, speed);
        } else {
          typing = false;
        }
      }

      t();
    }

    function forceTypeText(el, text, speed = 40) {
      clearTimeout(typeTimer);
      typing = true;
      currentText = text;
      el.textContent = "";

      let i = 0;

      function t() {
        if (i < text.length) {
          el.textContent += text[i];
          i++;
          typeTimer = setTimeout(t, speed);
        } else {
          typing = false;
        }
      }

      t();
    }

    function toggleBubble() {
      const bubble = document.getElementById("bubble");
      const textEl = document.getElementById("bubbleText");

      bubble.classList.toggle("show");

      if (bubble.classList.contains("show")) {
        forceTypeText(textEl, "一起來玩嘛 🧸💕");
      }
    }

    const sections = [
      { id: "fee", text: "贈訂也可以喔 🎁" },
      { id: "vip", text: "VIP 很香喔 💎" },
      { id: "note", text: "遲到不等尼喔 ⏰" }
    ];

    let scrollTimer = null;

    window.addEventListener("scroll", () => {
      clearTimeout(scrollTimer);

      scrollTimer = setTimeout(() => {
        let found = false;

        sections.forEach(s => {
          const el = document.getElementById(s.id);
          if (!el) return;

          const r = el.getBoundingClientRect();

          if (r.top < window.innerHeight * 0.6 && r.bottom > 0) {
            document.getElementById("bubble").classList.add("show");
            typeText(document.getElementById("bubbleText"), s.text);
            found = true;
          }
        });

        if (!found) {
          document.getElementById("bubble").classList.add("show");
          typeText(document.getElementById("bubbleText"), "一起來玩嘛 🧸💕");
        }
      }, 120);
    });

    let last = 0;
    window.addEventListener("scroll", () => {
      const cur = window.scrollY;
      const bear = document.getElementById("bear");

      if (cur > last) {
        bear.classList.add("look-down");
        bear.classList.remove("look-up");
      } else {
        bear.classList.add("look-up");
        bear.classList.remove("look-down");
      }

      last = cur;
    });

    function openVIP() {
      document.getElementById("vipModal").classList.add("show");
    }

    function closeVIP() {
      document.getElementById("vipModal").classList.remove("show");
    }

    function openJoin() {
      document.getElementById("joinModal").classList.add("show");
    }

    function closeJoin() {
      document.getElementById("joinModal").classList.remove("show");
    }

    function closeModal(e, id) {
      if (e.target.id === id) {
        document.getElementById(id).classList.remove("show");
      }
    }

    // 初始給一句話
    window.addEventListener("load", () => {
      const bubble = document.getElementById("bubble");
      bubble.classList.add("show");
      forceTypeText(document.getElementById("bubbleText"), "一起來玩嘛 🧸💕");
    });
  </script>
</body>
</html>
